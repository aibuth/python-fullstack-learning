<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册信息</title>
</head>
<body>
    <h1>注册信息</h1>
    <form action="">
        <h2>个人信息</h2>
        <label for="">姓名: </label><input type="text" placeholder="请输入真实姓名">
        <br><br>
        <label>密码: </label><input type="password" placeholder="请输入密码">
        <br><br>
        <label>确认密码: </label><input type="password" placeholder="请输入确认密码">
        <br><br>
        <label>性别: </label>
        <label><input type="radio" name="gender">男</label>
        <label><input type="radio" name="gender">女</label>
        <br><br>
        <label>居住城市: </label>
        <select name="" id="">
            <option value="">北京</option>
            <option value="">上海</option>
            <option value="">广州</option>
            <option value="">深圳</option>
            <option selected>杭州</option>
        </select>
        <br><br>

        <h2>教育经历</h2>
        <label>最高学历: </label>
        <select name="" id="">
            <option value="">博士</option>
            <option value="">硕士</option>
            <option value="" selected>本科</option>
            <option value="">专科</option>
            <option value="">研究生</option>
        </select>
        <br><br>
        <label>学校名称: </label> <input type="text">
        <br><br>
        <label>所学专业: </label> <input type="text">
        <br><br>
        <label>在校时间: </label>
        <select>
            <option value="">2015</option>
            <option value="">2016</option>
            <option value="">2017</option>
            <option value="">2018</option>
        </select>
        --
        <select>
            <option value="">2019</option>
            <option value="">2020</option>
            <option value="">2021</option>
            <option value="">2022</option>
        </select>
        <br><br>

        <h2>工作经历</h2>
        <label>公司名称: </label><input type="text">
        <br><br>
        <label>工作描述: </label>
        <br>
        <textarea></textarea>
        <br><br>
        <input type="checkbox"><label>已阅读并同意以下协议:</label>
        <br><br>
        <ul>
            <li><a href="#" target="_blank">《用户服务协议》</a></li>
            <li><a href="#" target="_blank">《隐私政策》</a></li>
        </ul>
        <br><br>
        <button>免费注册</button>
        <button type="reset">重新填写</button>
    </form>
</body>
</html>
